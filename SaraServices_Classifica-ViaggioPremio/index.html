<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viaggio premio SaraMobility</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏁</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #071a3e;
      --bg-card: rgba(8,28,68,.7);
      --bg-card-solid: #0a2050;
      --bg-card-hover: rgba(12,36,82,.85);
      --border: rgba(60,120,200,.2);
      --border-light: rgba(80,150,240,.3);
      --text: #e8edf5;
      --text-dim: #7a9cc4;
      --accent: #e8650a;
      --accent2: #f59e0b;
      --gold: #FFD700;
      --silver: #C0C0C0;
      --bronze: #CD7F32;
    }

    body {
      font-family: 'Manrope', system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background gradient ── */
    .bg-image {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: linear-gradient(
        160deg,
        #061630 0%,
        #0a2050 30%,
        #071a3e 60%,
        #040e28 100%
      );
    }

    /* ── Container ── */
    .container {
      position: relative; z-index: 1;
      width: 100%; max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 2rem;
      opacity: 0;
      animation: revealDown .7s .1s forwards;
    }
    .header .logo {
      height: 60px;
      margin-bottom: .6rem;
      filter: drop-shadow(0 2px 12px rgba(232,101,10,.3));
    }
    .header h1 {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: -.03em;
      color: #fff;
    }
    .header h1 span {
      background: linear-gradient(135deg, #e8650a, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .subtitle {
      margin-top: .35rem;
      font-size: .85rem;
      color: var(--text-dim);
      font-weight: 500;
    }

    /* ── Countdown ── */
    .countdown {
      display: flex;
      justify-content: center;
      gap: .6rem;
      margin-bottom: 1.8rem;
      opacity: 0;
      animation: revealUp .5s .3s forwards;
    }
    .countdown-block {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: .6rem .85rem;
      text-align: center;
      min-width: 62px;
    }
    .countdown-block .cd-value {
      font-size: 1.5rem;
      font-weight: 900;
      color: #fff;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }
    .countdown-block .cd-label {
      font-size: .55rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 600;
      margin-top: .15rem;
    }
    .countdown-sep {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent);
      align-self: center;
      padding-bottom: .6rem;
      animation: blink 1s infinite;
    }

    /* ── Podium (top 3) ── */
    .podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 1rem;
      margin-bottom: 2rem;
      min-height: 200px;
    }
    .podium-slot {
      display: flex; flex-direction: column; align-items: center;
      opacity: 0; transform: translateY(30px) scale(.9);
      transition: all .5s cubic-bezier(.2,.8,.2,1);
    }
    .podium-slot.show { opacity: 1; transform: translateY(0) scale(1); }
    .podium-slot.first  { order: 2; }
    .podium-slot.second { order: 1; }
    .podium-slot.third  { order: 3; }

    .podium-card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 1.2rem 1.4rem 1rem;
      text-align: center;
      border: 1px solid var(--border);
      position: relative;
      min-width: 150px;
      transition: box-shadow .4s, border-color .4s;
    }
    .first .podium-card {
      border-color: rgba(255,215,0,.4);
      box-shadow: 0 0 40px rgba(255,215,0,.12), 0 8px 32px rgba(0,0,0,.3);
      padding: 1.5rem 1.6rem 1.2rem;
      min-width: 170px;
    }
    .second .podium-card {
      border-color: rgba(192,192,192,.3);
      box-shadow: 0 0 30px rgba(192,192,192,.08), 0 8px 24px rgba(0,0,0,.3);
    }
    .third .podium-card {
      border-color: rgba(205,127,50,.3);
      box-shadow: 0 0 30px rgba(205,127,50,.08), 0 8px 24px rgba(0,0,0,.3);
    }
    .podium-medal { font-size: 2rem; margin-bottom: .3rem; }
    .first .podium-medal { font-size: 2.5rem; }
    .podium-rank {
      font-size: .65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; margin-bottom: .4rem;
    }
    .first  .podium-rank { color: var(--gold); }
    .second .podium-rank { color: var(--silver); }
    .third  .podium-rank { color: var(--bronze); }
    .podium-name {
      font-size: .78rem; font-weight: 700; color: #fff;
      margin-bottom: .25rem;
      max-width: 160px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .podium-orders {
      font-size: 1.4rem; font-weight: 900; color: #fff;
      font-variant-numeric: tabular-nums;
    }
    .first .podium-orders { font-size: 1.7rem; }
    .podium-orders small {
      font-size: .6rem; font-weight: 500; color: var(--text-dim);
    }
    .podium-bar {
      width: 100%; height: 4px;
      background: rgba(255,255,255,.06);
      border-radius: 2px;
      margin-top: .6rem; overflow: hidden;
    }
    .podium-bar-fill {
      height: 100%; border-radius: 2px; width: 0;
      transition: width .8s cubic-bezier(.25,.8,.25,1);
    }
    .first  .podium-bar-fill { background: linear-gradient(90deg, #FFD700, #FFA500); }
    .second .podium-bar-fill { background: linear-gradient(90deg, #d4d4d8, #9CA3AF); }
    .third  .podium-bar-fill { background: linear-gradient(90deg, #CD7F32, #A0522D); }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: .6rem;
      opacity: 0;
    }
    .toolbar.show { animation: fadeIn .3s forwards; }
    .shuffle-label {
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--accent);
      display: flex; align-items: center; gap: .4rem;
    }
    .shuffle-label .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent); animation: blink .8s infinite;
    }
    .shuffle-label.done { color: #22c55e; }
    .shuffle-label.done .dot { background: #22c55e; animation: none; }
    @keyframes blink { 50% { opacity: .2; } }

    .last-update {
      font-size: .7rem; font-weight: 500;
      color: var(--text-dim);
      display: flex; align-items: center; gap: .35rem;
    }
    .last-update strong {
      color: var(--text); font-weight: 700;
    }

    /* ── Leaderboard list (rank 4+) ── */
    .leaderboard { display: flex; flex-direction: column; gap: 4px; }

    .row {
      display: flex; align-items: center; gap: .65rem;
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: .7rem .9rem;
      transition: transform .3s cubic-bezier(.4,0,.2,1),
                  opacity .3s, background .3s, border-color .3s;
      will-change: transform;
      cursor: default;
      position: relative; overflow: hidden;
    }
    .row:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-light);
      transform: translateX(3px);
    }
    .row::after {
      content: ''; position: absolute; top: 0; left: -100%; bottom: 0;
      width: 50%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.03), transparent);
      transition: left .45s;
    }
    .row:hover::after { left: 150%; }

    .rank-badge {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: .75rem; flex-shrink: 0;
      background: rgba(232,101,10,.12);
      color: var(--accent);
    }

    .info { flex: 1; min-width: 0; }
    .agency-name {
      font-weight: 600; font-size: .82rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .bar-track {
      height: 3px; background: rgba(255,255,255,.05);
      border-radius: 2px; margin-top: .3rem; overflow: hidden;
    }
    .bar-fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0; transition: width .7s cubic-bezier(.25,.8,.25,1);
    }

    .orders {
      font-weight: 800; font-size: .85rem; color: #fff;
      white-space: nowrap; flex-shrink: 0;
      font-variant-numeric: tabular-nums;
      min-width: 50px; text-align: right;
    }
    .orders small { font-weight: 500; font-size: .6rem; color: var(--text-dim); margin-left: 2px; }

    /* ── Spinner ── */
    .spinner-wrapper {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 5rem 0; gap: 1rem;
      color: var(--text-dim); font-size: .8rem; font-weight: 500;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    .error-box {
      text-align: center;
      background: var(--bg-card-solid);
      border: 1px solid #dc2626;
      border-radius: 16px;
      padding: 2.5rem; color: #fca5a5;
    }
    .error-box .icon { font-size: 2rem; margin-bottom: .5rem; }
    .error-box strong { font-size: .95rem; }
    .error-box p { font-size: .8rem; color: var(--text-dim); margin-top: .4rem; }

    /* ── Animations ── */
    @keyframes revealDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes revealUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .container { padding: 1.5rem .75rem 3rem; }
      .header .logo { height: 45px; }
      .header h1 { font-size: 1.6rem; }
      .podium { gap: .5rem; }
      .podium-card { min-width: 100px; padding: .9rem .8rem .7rem; border-radius: 14px; }
      .first .podium-card { min-width: 115px; padding: 1rem .9rem .8rem; }
      .podium-name { font-size: .68rem; max-width: 100px; }
      .podium-orders { font-size: 1.1rem; }
      .first .podium-orders { font-size: 1.3rem; }
      .podium-medal { font-size: 1.5rem; }
      .first .podium-medal { font-size: 1.8rem; }
      .stat-pill { padding: .45rem 1rem; }
      .stat-pill .pill-value { font-size: .95rem; }
      .row { padding: .6rem .7rem; gap: .5rem; border-radius: 10px; }
      .rank-badge { width: 28px; height: 28px; font-size: .7rem; border-radius: 7px; }
      .agency-name { font-size: .75rem; }
      .orders { font-size: .78rem; }
    }
    @media (max-width: 380px) {
      .podium-card { min-width: 85px; }
      .first .podium-card { min-width: 95px; }
    }
  </style>
</head>
<body>

<!-- Background image with overlay -->
<div class="bg-image"></div>

<div class="container">
  <div class="header">
    <img src="logo.png" alt="Sara Mobility" class="logo">
    <h1>Viaggio premio <span>SaraMobility</span></h1>
    <div class="subtitle" id="subtitle"></div>
  </div>

  <div class="countdown" id="countdown">
    <div class="countdown-block">
      <div class="cd-value" id="cdDays">---</div>
      <div class="cd-label">Giorni</div>
    </div>
    <span class="countdown-sep">:</span>
    <div class="countdown-block">
      <div class="cd-value" id="cdHours">--</div>
      <div class="cd-label">Ore</div>
    </div>
    <span class="countdown-sep">:</span>
    <div class="countdown-block">
      <div class="cd-value" id="cdMins">--</div>
      <div class="cd-label">Minuti</div>
    </div>
    <span class="countdown-sep">:</span>
    <div class="countdown-block">
      <div class="cd-value" id="cdSecs">--</div>
      <div class="cd-label">Secondi</div>
    </div>
  </div>



  <div class="podium" id="podium" style="display:none"></div>

  <div class="toolbar" id="toolbar">
    <div class="shuffle-label" id="shuffleLabel">
      <span class="dot"></span>
      <span id="shuffleText">Analisi in corso...</span>
    </div>
    <div class="last-update" id="lastUpdate"></div>
  </div>

  <div id="content"></div>
</div>

<script>
  // ── Configurazione ──
  const SHEET_ID = "1Z-P0GDi9Y5KbImF6-hpbwdMo1xU6BgIULgjwWp-qXWo";
  const API_KEY  = "AIzaSyBpYB_MG-W586yh1d5kZkd6nM-prfZDx2I";
  const RANGE    = "Sheet1!D:AG";
  const API_URL  = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}?alt=json&key=${API_KEY}`;
  // Indici relativi al range D:AG → D=0, E=1, ... AG=29
  const COL_DATA = 0, COL_ANNO = 1, COL_AGENZIA = 29;

  // ── DOM ──
  const $ = id => document.getElementById(id);
  const $content = $('content'), $podium = $('podium');
  const $toolbar = $('toolbar'), $subtitle = $('subtitle');
  const $lastUpdate = $('lastUpdate');
  const $shuffleLabel = $('shuffleLabel'), $shuffleText = $('shuffleText');

  // ── Fetch ──
  async function loadData() {
    $podium.style.display = 'none';
    $toolbar.classList.remove('show');
    $content.innerHTML = `
      <div class="spinner-wrapper">
        <div class="spinner"></div>
        Caricamento dati…
      </div>`;

    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      const data = processRows(json.values);
      await renderWithShuffle(data);
    } catch (err) {
      showError(err.message);
    }
  }

  // ── Parsing data dd/mm/yyyy o d/m/yyyy ──
  // Formato API: "DD- Month-YYYY" (es. "04- April-2026")
  const MONTHS = { january:0, february:1, march:2, april:3, may:4, june:5,
                   july:6, august:7, september:8, october:9, november:10, december:11 };
  function parseDate(str) {
    if (!str) return null;
    const m = str.match(/(\d+)-\s*(\w+)-(\d{4})/);
    if (!m) return null;
    const d = parseInt(m[1]);
    const mon = MONTHS[m[2].toLowerCase()];
    const y = parseInt(m[3]);
    if (mon === undefined) return null;
    const date = new Date(y, mon, d);
    return isNaN(date.getTime()) ? null : date;
  }

  // ── Aggregazione ──
  function processRows(rows) {
    const dataRows = rows.slice(1);
    const anni = [...new Set(dataRows.map(r => r[COL_ANNO]).filter(Boolean))];
    const anno = anni.sort().pop() || new Date().getFullYear();
    const counts = {};
    let totaleOrdini = 0;
    let ultimaData = null;

    for (const row of dataRows) {
      if (row[COL_ANNO] !== String(anno)) continue;
      const ag = (row[COL_AGENZIA] || '').trim();
      if (!ag) continue;
      if (/direzione|sara\s*services/i.test(ag)) continue;
      counts[ag] = (counts[ag] || 0) + 1;
      totaleOrdini++;
      const d = parseDate(row[COL_DATA]);
      // Accetta solo date coerenti con l'anno in analisi (esclude refusi/date future)
      if (d && d.getFullYear() === parseInt(anno) && (!ultimaData || d > ultimaData)) ultimaData = d;
    }

    const leaderboard = Object.entries(counts)
      .sort((a, b) => b[1] - a[1])
      .map(([agenzia, ordini], i) => ({ rank: i + 1, agenzia, ordini }));

    return { anno, totaleOrdini, totaleAgenzie: leaderboard.length, leaderboard, ultimaData };
  }

  // ── Animated counter ──
  function animateCount(el, target, dur) {
    const end = parseInt(target);
    if (isNaN(end)) { el.textContent = target; return; }
    const start = performance.now();
    (function tick(now) {
      const t = Math.min((now - start) / dur, 1);
      el.textContent = Math.round((1 - Math.pow(1 - t, 3)) * end).toLocaleString('it-IT');
      if (t < 1) requestAnimationFrame(tick);
    })(start);
  }

  // ── Build row HTML (rank 4+) ──
  function rowHTML(item, maxOrd) {
    const pct = Math.round((item.ordini / maxOrd) * 100);
    return `
      <div class="row" data-rank="${item.rank}" data-pct="${pct}">
        <div class="rank-badge">${item.rank}</div>
        <div class="info">
          <div class="agency-name" title="${item.agenzia}">${item.agenzia}</div>
          <div class="bar-track"><div class="bar-fill"></div></div>
        </div>
        <div class="orders">${item.ordini}<small>ordini</small></div>
      </div>`;
  }

  // ── Render podium ──
  function buildPodium(top3, maxOrd) {
    const medals = ['🥇','🥈','🥉'];
    const labels = ['1° Posto','2° Posto','3° Posto'];
    const cls    = ['first','second','third'];
    return top3.map((item, i) => {
      const pct = Math.round((item.ordini / maxOrd) * 100);
      return `
        <div class="podium-slot ${cls[i]}" id="pod${i}">
          <div class="podium-card">
            <div class="podium-medal">${medals[i]}</div>
            <div class="podium-rank">${labels[i]}</div>
            <div class="podium-name" title="${item.agenzia}">${item.agenzia}</div>
            <div class="podium-orders">${item.ordini}<small> ordini</small></div>
            <div class="podium-bar"><div class="podium-bar-fill" data-pct="${pct}"></div></div>
          </div>
        </div>`;
    }).join('');
  }

  // ── Main render with shuffle ──
  async function renderWithShuffle(data) {
    const { anno, totaleOrdini, totaleAgenzie, leaderboard, ultimaData } = data;
    const maxOrd = leaderboard[0]?.ordini || 1;
    const top3 = leaderboard.slice(0, 3);
    const rest = leaderboard.slice(3);

    // Header
    $subtitle.textContent = `Classifica agenzie — Anno ${anno}`;

    // Data ultimo aggiornamento
    if (ultimaData) {
      $lastUpdate.innerHTML = `Ultimo aggiornamento: <strong>${ultimaData.toLocaleDateString('it-IT', { day: '2-digit', month: 'long', year: 'numeric' })}</strong>`;
    }

    // Toolbar
    $toolbar.classList.add('show');
    $shuffleLabel.classList.remove('done');
    $shuffleText.textContent = 'Calcolo classifica...';

    // Shuffled list (rank 4+)
    const shuffled = [...rest].sort(() => Math.random() - .5);
    const container = document.createElement('div');
    container.className = 'leaderboard';
    container.innerHTML = shuffled.map(it => rowHTML(it, maxOrd)).join('');
    $content.innerHTML = '';
    $content.appendChild(container);

    // Fade in rows fast
    const rows = [...container.querySelectorAll('.row')];
    rows.forEach(r => { r.style.opacity = '0'; r.style.transform = 'translateY(10px)'; });
    await sleep(80);
    for (const r of rows) {
      r.style.transition = 'opacity .15s, transform .15s';
      r.style.opacity = '1';
      r.style.transform = 'translateY(0)';
      await sleep(10);
    }
    await sleep(200);

    // ── 2 shuffle rounds (fast) ──
    for (let round = 0; round < 2; round++) {
      $shuffleText.textContent = `Shuffling... (${round + 1}/2)`;
      const cur = [...container.querySelectorAll('.row')];
      const positions = cur.map(r => r.getBoundingClientRect());
      cur.sort(() => Math.random() - .5).forEach(r => container.appendChild(r));
      const newRows = [...container.querySelectorAll('.row')];
      newRows.forEach((row, i) => {
        const oldI = cur.indexOf(row);
        const dy = positions[oldI].top - row.getBoundingClientRect().top;
        row.style.transition = 'none';
        row.style.transform = `translateY(${dy}px)`;
        void row.offsetWidth;
        row.style.transition = 'transform .3s cubic-bezier(.4,0,.2,1)';
        row.style.transform = 'translateY(0)';
      });
      await sleep(380);
    }

    // ── Final sort ──
    $shuffleText.textContent = 'Ordinamento finale...';
    await sleep(150);

    const before = [...container.querySelectorAll('.row')];
    const bPos = before.map(r => r.getBoundingClientRect());
    const sorted = before.slice().sort((a, b) => a.dataset.rank - b.dataset.rank);
    sorted.forEach(r => container.appendChild(r));
    const after = [...container.querySelectorAll('.row')];
    after.forEach((row, i) => {
      const dy = bPos[before.indexOf(row)].top - row.getBoundingClientRect().top;
      row.style.transition = 'none';
      row.style.transform = `translateY(${dy}px)`;
      void row.offsetWidth;
      row.style.transition = 'transform .5s cubic-bezier(.2,.8,.2,1)';
      row.style.transform = 'translateY(0)';
    });
    await sleep(600);

    // ── Reveal podium ──
    $podium.innerHTML = buildPodium(top3, maxOrd);
    $podium.style.display = 'flex';

    const order = [1, 0, 2];
    for (const i of order) {
      const slot = $(`pod${i}`);
      if (slot) { slot.classList.add('show'); await sleep(250); }
    }

    await sleep(150);
    document.querySelectorAll('.podium-bar-fill').forEach(b => {
      b.style.width = b.dataset.pct + '%';
    });
    container.querySelectorAll('.bar-fill').forEach(b => {
      b.style.width = b.closest('.row').dataset.pct + '%';
    });

    $shuffleLabel.classList.add('done');
    $shuffleText.textContent = 'Classifica completata';
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function showError(msg) {
    $toolbar.classList.add('show');
    $shuffleLabel.classList.add('done');
    $shuffleText.textContent = '';
    $podium.style.display = 'none';
    $content.innerHTML = `
      <div class="error-box">
        <div class="icon">⚠️</div>
        <strong>Impossibile caricare i dati</strong>
        <p>${msg}</p>
      </div>`;
  }

  // ── Countdown al 31/12/2026 00:00:00 ──
  const CONTEST_END = new Date(2026, 11, 31, 0, 0, 0).getTime();
  function updateCountdown() {
    const now = Date.now();
    const diff = Math.max(0, CONTEST_END - now);
    const s = Math.floor(diff / 1000);
    const days  = Math.floor(s / 86400);
    const hours = Math.floor((s % 86400) / 3600);
    const mins  = Math.floor((s % 3600) / 60);
    const secs  = s % 60;
    $('cdDays').textContent  = String(days).padStart(3, '0');
    $('cdHours').textContent = String(hours).padStart(2, '0');
    $('cdMins').textContent  = String(mins).padStart(2, '0');
    $('cdSecs').textContent  = String(secs).padStart(2, '0');
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);

  loadData();
</script>
</body>
</html>
